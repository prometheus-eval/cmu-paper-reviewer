services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "8080"
    env_file:
      - ../.env
    volumes:
      - reviewer_data:/app/data

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

volumes:
  reviewer_data:
  caddy_data:
  caddy_config:
